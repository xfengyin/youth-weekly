name: Weekly Auto-Publish

on:
  schedule:
    # 每周一 UTC 13:00 (北京时间 21:00) 自动采集并发布
    - cron: '0 13 * * 1'
  workflow_dispatch:
    description: '手动触发周刊采集与发布'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  weekly-publish:
    name: Weekly Auto-Publish
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          cd scripts
          pip install -r requirements.txt

      - name: Collect content from sources
        id: collect
        run: |
          cd scripts
          python collect_content.py

      - name: Generate new weekly issue
        id: generate
        run: |
          cd scripts
          python generate_issue.py

      - name: Commit generated issue
        run: |
          git config user.email "action@github.com"
          git config user.name "青年周刊编辑部"
          git add docs/issues/
          if git diff --staged --quiet; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            git commit -m "📰 自动生成新一期周刊 [skip ci]"
            git push
          fi

      - name: Check if issue was generated
        if: steps.commit.outputs.no_changes != 'true'
        id: check
        run: |
          echo "has_new=true" >> $GITHUB_OUTPUT

      - name: Generate static content
        if: steps.check.outputs.has_new == 'true' || steps.commit.outputs.no_changes != 'true'
        run: |
          cd scripts
          python generate_static_ocp.py
          python generate_rss.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./scripts/dist
          publish_branch: gh-pages
