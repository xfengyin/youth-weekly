name: Weekly Auto-Publish

on:
  schedule:
    # 每周一 UTC 13:00 (北京时间 21:00) 自动采集并发布
    - cron: '0 13 * * 1'
  workflow_dispatch:
    description: '手动触发周刊采集与发布'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  weekly-publish:
    name: Weekly Auto-Publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          cd scripts
          pip install -r requirements.txt

      - name: Collect content from sources
        id: collect
        continue-on-error: true
        run: |
          cd scripts
          python collect_content.py || echo "collection_failed=true" >> $GITHUB_OUTPUT

      - name: Check if collected content exists
        id: content_check
        run: |
          if [ -f scripts/.curated_content.json ]; then
            echo "has_content=true" >> $GITHUB_OUTPUT
          else
            echo "has_content=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate new weekly issue
        id: generate
        if: steps.content_check.outputs.has_content == 'true'
        run: |
          cd scripts
          python generate_issue.py

      - name: Commit generated issue
        id: commit
        if: steps.content_check.outputs.has_content == 'true'
        run: |
          git config user.email "action@github.com"
          git config user.name "青年周刊编辑部"
          git add docs/issues/
          if git diff --staged --quiet; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            git commit -m "📰 自动生成新一期周刊 [skip ci]"
            git push
          fi

      - name: Generate static content
        run: |
          cd scripts
          python generate_static_ocp.py
          python generate_rss.py

      - name: Prepare deployment
        run: |
          mkdir -p deploy-output
          # 复制 Python 生成的静态文件 (JSON, RSS)
          if [ -d "scripts/dist" ]; then
            cp scripts/dist/*.json deploy-output/ 2>/dev/null || true
            cp scripts/dist/rss.xml deploy-output/ 2>/dev/null || true
          fi
          # 复制周刊 markdown 源文件
          if [ -d "docs" ]; then
            cp -r docs deploy-output/
          fi
          # 创建最小化 index.html (主站由 deploy.yml 构建)
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>青年周刊</title><meta http-equiv="refresh" content="0;url=https://xfengyin.github.io/youth-weekly"></head><body><p>Redirecting to <a href="https://xfengyin.github.io/youth-weekly">青年周刊</a>...</p></body></html>' > deploy-output/index.html
          touch deploy-output/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy-output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
