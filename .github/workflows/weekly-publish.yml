name: Weekly Auto-Publish

on:
  schedule:
    # 每周一 UTC 13:00 (北京时间 21:00) 自动采集并发布
    - cron: '0 13 * * 1'
  workflow_dispatch:
    description: '手动触发周刊采集与发布'

# 最小化权限：只给必要的权限
permissions:
  contents: write
  pages: write
  id-token: write

# 并发控制：避免重复触发
concurrency:
  group: "weekly-publish-${{ github.workflow }}"
  cancel-in-progress: false  # 周刊生成不可打断

jobs:
  weekly-publish:
    name: Weekly Auto-Publish
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "scripts/uv.lock"

      - name: Install Python dependencies
        working-directory: scripts
        run: |
          uv sync --frozen

      - name: Collect content from sources
        id: collect
        continue-on-error: true
        working-directory: scripts
        run: |
          uv run youth-weekly collect || echo "collection_failed=true" >> $GITHUB_OUTPUT

      - name: Check if collected content exists
        id: content_check
        run: |
          if [ -f scripts/.curated_content.json ]; then
            echo "has_content=true" >> $GITHUB_OUTPUT
          else
            echo "has_content=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate new weekly issue
        id: generate
        if: steps.content_check.outputs.has_content == 'true'
        working-directory: scripts
        run: |
          uv run youth-weekly issue

      - name: Commit generated issue
        id: commit
        if: steps.content_check.outputs.has_content == 'true'
        run: |
          git config user.email "action@github.com"
          git config user.name "青年周刊编辑部"
          git add docs/issues/
          if git diff --staged --quiet; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            git commit -m "📰 自动生成新一期周刊 [skip ci]"
            git push
          fi

      # 自动触发主站 deploy.yml 重新构建
      - name: Trigger site rebuild
        if: steps.commit.outputs.no_changes != 'true'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"main"}'

      # 通知用户结果（成功/失败/无新内容）
      - name: Notify result
        if: always()
        run: |
          if [ "${{ steps.commit.outputs.no_changes }}" = "true" ]; then
            echo "ℹ️ No new content to publish this week"
          elif [ "${{ steps.content_check.outputs.has_content }}" = "false" ]; then
            echo "⚠️ Content collection failed, no new issue generated"
          else
            echo "✅ New weekly issue published and site rebuild triggered"
          fi
