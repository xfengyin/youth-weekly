name: Weekly Auto-Publish

on:
  schedule:
    # 每周一 UTC 13:00 (北京时间 21:00) 自动采集并发布
    - cron: '0 13 * * 1'
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发原因'
        required: false
        default: '手动触发周刊采集与发布'

# 最小化权限：周刊只需写仓库内容 + 触发主站 deploy
permissions:
  contents: write
  actions: write

# 并发控制：避免重复触发
# 同 workflow 在不同 ref 下可并行，但同一 ref 上串行（保证周刊原子性）
concurrency:
  group: "weekly-publish-${{ github.ref }}"
  cancel-in-progress: false  # 周刊生成不可打断

jobs:
  weekly-publish:
    name: Weekly Auto-Publish
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "scripts/uv.lock"

      - name: Install Python dependencies
        working-directory: scripts
        run: |
          uv sync --frozen

      - name: Ensure output directories exist
        run: |
          mkdir -p scripts/dist

      # 1. 采集阶段
      - name: Collect content from sources
        id: collect
        working-directory: scripts
        env:
          YOUTH_WEEKLY_LLM_API_KEY: ${{ secrets.YOUTH_WEEKLY_LLM_API_KEY }}
        run: |
          uv run youth-weekly collect

      - name: Check if collected content exists
        id: content_check
        run: |
          if [ -f scripts/.curated_content.json ]; then
            echo "has_content=true" >> $GITHUB_OUTPUT
          else
            echo "has_content=false" >> $GITHUB_OUTPUT
          fi

      # 2. 生成阶段
      - name: Generate new weekly issue
        id: generate
        if: steps.content_check.outputs.has_content == 'true'
        working-directory: scripts
        env:
          YOUTH_WEEKLY_LLM_API_KEY: ${{ secrets.YOUTH_WEEKLY_LLM_API_KEY }}
        run: |
          uv run youth-weekly issue

      # 3. 提交阶段：将新一期推送到 main
      - name: Commit generated issue
        id: commit
        if: steps.content_check.outputs.has_content == 'true'
        run: |
          git config user.email "action@github.com"
          git config user.name "青年周刊编辑部"
          git add docs/issues/
          if git diff --staged --quiet; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            git commit -m "📰 自动生成新一期周刊 [skip ci]"
            git push
            echo "no_changes=false" >> $GITHUB_OUTPUT
          fi

      # 4. 触发主站 rebuild（仅在有变更时）
      - name: Trigger site rebuild
        if: steps.commit.outputs.no_changes == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github.v3+json" \
            "/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches" \
            -f ref="${{ github.ref_name }}"

      # 5. 汇总结果
      - name: Notify result
        if: always()
        run: |
          if [ "${{ steps.collect.outcome }}" = "failure" ]; then
            echo "❌ Content collection failed; check the 'Collect content from sources' step logs"
            exit 1
          elif [ "${{ steps.content_check.outputs.has_content }}" = "false" ]; then
            echo "⚠️ No curated content available, skipping issue generation"
          elif [ "${{ steps.commit.outputs.no_changes }}" = "true" ]; then
            echo "ℹ️ No new content to publish this week"
          else
            echo "✅ New weekly issue published and site rebuild triggered"
          fi
