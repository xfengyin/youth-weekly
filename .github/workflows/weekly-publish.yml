name: Weekly Auto-Publish

on:
  schedule:
    # 每周一 UTC 13:00 (北京时间 21:00) 自动采集并发布
    - cron: '0 13 * * 1'
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发原因'
        required: false
        default: '手动触发周刊采集与发布'

# 最小化权限：周刊只需写仓库内容（commit 推送新一期）
# 注意：不需要 actions: write —— 主站部署由 deploy.yml 在收到 push 后自然触发
permissions:
  contents: write

# 并发控制：与 deploy.yml 使用不同的 group 名，互不阻塞；
# 周刊生成原子性：同 workflow 下串行进行，新运行不打断旧运行。
concurrency:
  group: "weekly-publish-${{ workflow }}"
  cancel-in-progress: false  # 周刊生成不可打断

jobs:
  weekly-publish:
    name: Weekly Auto-Publish
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "scripts/uv.lock"

      - name: Install Python dependencies
        working-directory: scripts
        run: |
          uv sync --frozen

      - name: Ensure output directories exist
        run: |
          mkdir -p scripts/dist

      # 1. 采集阶段
      - name: Collect content from sources
        id: collect
        working-directory: scripts
        env:
          YOUTH_WEEKLY_LLM_API_KEY: ${{ secrets.YOUTH_WEEKLY_LLM_API_KEY }}
        run: |
          uv run youth-weekly collect

      - name: Check if collected content exists
        id: content_check
        run: |
          if [ -f scripts/.curated_content.json ]; then
            echo "has_content=true" >> $GITHUB_OUTPUT
          else
            echo "has_content=false" >> $GITHUB_OUTPUT
          fi

      # 2. 生成阶段
      - name: Generate new weekly issue
        id: generate
        if: steps.content_check.outputs.has_content == 'true'
        working-directory: scripts
        env:
          YOUTH_WEEKLY_LLM_API_KEY: ${{ secrets.YOUTH_WEEKLY_LLM_API_KEY }}
        run: |
          uv run youth-weekly issue

      # 3. 提交阶段：将新一期推送到 main
      #    注意：commit message 使用 [skip ci] 仅用于跳过 ci.yml 的冗余校验，
      #    不会跳过 deploy.yml（按设计 deploy 会自然触发并完成 Pages 部署）。
      - name: Commit generated issue
        id: commit
        if: steps.content_check.outputs.has_content == 'true'
        run: |
          git config user.email "action@github.com"
          git config user.name "青年周刊编辑部"
          git add docs/issues/
          if git diff --staged --quiet; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            git commit -m "📰 自动生成新一期周刊 [skip ci]"
            git push
            echo "no_changes=false" >> $GITHUB_OUTPUT
          fi

      # 4. 汇总结果
      #    主站部署由 deploy.yml 在收到上方 push 后自然触发，无需在此 dispatch。
      - name: Notify result
        if: always()
        run: |
          if [ "${{ steps.collect.outcome }}" = "failure" ]; then
            echo "❌ Content collection failed; check the 'Collect content from sources' step logs"
            exit 1
          elif [ "${{ steps.content_check.outputs.has_content }}" = "false" ]; then
            echo "⚠️ No curated content available, skipping issue generation"
          elif [ "${{ steps.commit.outputs.no_changes }}" = "true" ]; then
            echo "ℹ️ No new content to publish this week"
          else
            echo "✅ New weekly issue published; deploy.yml will be triggered by the push to main"
          fi
