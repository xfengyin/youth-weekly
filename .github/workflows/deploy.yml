name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 最小化权限原则：明确声明，避免权限污染
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制：同 workflow+ref+event 下只允许一个 deploy 运行
concurrency:
  group: "pages-deploy-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    name: Build & Upload Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "scripts/uv.lock"

      - name: Install dependencies
        run: |
          cd web
          npm install
          cd ../scripts
          uv sync --no-dev

      - name: Generate content
        run: |
          cd scripts
          uv run youth-weekly generate
          uv run youth-weekly rss

      - name: Build site
        run: |
          cd web
          npm run build

      - name: Prepare deployment
        id: prepare
        run: |
          mkdir -p output
          if [ -d "web/out" ]; then
            echo "📦 Using Next.js static export (web/out)"
            cp -r web/out/. output/
          elif [ -d "web/.next" ]; then
            echo "📦 Using Next.js build output (web/.next)"
            mkdir -p output/_next
            cp -r web/.next/static/. output/_next/static/ 2>/dev/null || true
          else
            echo "⚠️ No build output found, using fallback"
            cp -r docs/. output/ 2>/dev/null || true
            echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>青年周刊</title></head><body><p>Build required.</p></body></html>' > output/index.html
          fi
          touch output/.nojekyll

      - name: Verify deployment
        run: |
          if [ ! -f "output/index.html" ]; then
            echo "❌ Deployment verification failed: no index.html found"
            ls -la output/ 2>&1 || true
            exit 1
          fi
          echo "✅ Deployment verification passed: $(ls output/ | wc -l) files ready"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      # 配置 Pages（即使已有配置也安全）
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          # 启用 Pages（自动 enablement）
          enablement: true

      # 部署（不绑定 environment，避免 environment 保护规则）
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
