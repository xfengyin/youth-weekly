# =============================================================================
# Pages 部署说明（消除双轨冲突）
# -----------------------------------------------------------------------------
# 1) 仓库 Settings → Pages → Build and deployment → Source
#    必须选择 "GitHub Actions"（而不是 "Deploy from a branch"）。
#    选择 "GitHub Actions" 后，GitHub 内置的 pages-build-deployment workflow
#    不会再与本文件并发运行，从根本上消除双轨冲突。
# 2) 首次启用时需仓库管理员在 Settings → Pages 中手动点击启用；
#    GITHUB_TOKEN 没有 admin:repo / admin:org 权限，无法自动开启 Pages。
# 3) 本 workflow 不绑定 environment：避免 environment 保护规则（如 required
#    reviewers、wait timer）阻塞部署，保留已验证通过的轻量部署链路。
# 4) 并发控制 group: pages-deploy-${{ workflow }}-${{ ref }}
#    - 同 workflow + 同 ref 下，新运行会取消旧运行，避免竞态。
#    - 与 weekly-publish 使用不同的 group 名，互不阻塞。
# =============================================================================
name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 最小化权限：仅授予 Pages 部署所需的最小权限
# 注意：GITHUB_TOKEN 无法启用 Pages，需在仓库设置中手动启用
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制：同 workflow+ref 下只允许一个 deploy 运行，
# 避免多次部署互相覆盖或抢资源；新运行取消旧运行。
concurrency:
  group: "pages-deploy-${{ workflow }}-${{ ref }}"
  cancel-in-progress: true

jobs:
  build:
    name: Build & Upload Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "scripts/uv.lock"

      - name: Install dependencies
        run: |
          cd web
          npm install --no-audit --no-fund
          cd ../scripts
          uv sync --no-dev

      - name: Generate content
        run: |
          cd scripts
          uv run youth-weekly generate
          uv run youth-weekly rss

      - name: Build site
        run: |
          cd web
          npm run build

      - name: Prepare deployment artifact
        id: prepare
        run: |
          # 清理旧产物，避免污染
          rm -rf output
          mkdir -p output

          # 优先使用 Next.js 静态导出（next.config.js 中 output: 'export'）
          if [ -d "web/out" ] && [ -f "web/out/index.html" ]; then
            echo "📦 Using Next.js static export (web/out)"
            cp -r web/out/. output/
          else
            echo "❌ Build output not found or invalid: web/out/index.html missing"
            echo "---- web/out contents ----"
            ls -la web/out 2>&1 || echo "(no web/out directory)"
            exit 1
          fi

          # 复制 RSS 文件到网站根目录（如有）
          if [ -f "scripts/dist/rss.xml" ]; then
            echo "📰 Copying RSS feed"
            cp scripts/dist/rss.xml output/rss.xml
          fi

          # 关键：禁用 Jekyll，否则以 _ 开头的文件（如 _next）会被忽略
          touch output/.nojekyll

          echo "artifact_ready=true" >> $GITHUB_OUTPUT

      - name: Verify deployment artifact
        run: |
          if [ ! -f "output/index.html" ]; then
            echo "❌ Verification failed: output/index.html not found"
            exit 1
          fi
          echo "✅ Verification passed: $(find output -type f | wc -l) files ready"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    # 不绑定 environment，避免 environment 保护规则阻塞部署

    steps:
      # 配置 Pages（不传 enablement，因为 GITHUB_TOKEN 无 admin 权限）
      # 若 Pages 未启用，此步骤会失败，需用户先在仓库设置中启用
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
