name: Deploy

on:
  push:
    branches: [ main ]
  schedule:
    # 每周一早上 8 点自动部署（UTC 0:00 = 北京时间 8:00）
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd web
        npm install
        cd ../scripts
        pip install -r requirements.txt

    - name: Generate content
      run: |
        cd scripts
        python generate_static.py || echo "⚠️ Static generation skipped"
        python generate_rss.py || echo "⚠️ RSS generation skipped"

    - name: Build site
      run: |
        cd web
        npm run build || true

    - name: Prepare deployment
      run: |
        mkdir -p output
        # Copy built site if available
        if [ -d "web/out" ]; then
          cp -r web/out/* output/
        elif [ -d "web/dist" ]; then
          cp -r web/dist/* output/
        else
          # Fallback: copy docs as static site
          cp -r docs/* output/
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0;url=./issues/001/"></head><body><p>Redirecting...</p></body></html>' > output/index.html
        fi
        # Add nojekyll
        touch output/.nojekyll

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
