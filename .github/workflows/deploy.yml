name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "deploy-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        cd web
        npm install
        cd ../scripts
        pip install -r requirements.txt

    - name: Generate content
      run: |
        cd scripts
        python generate_static_ocp.py
        python generate_rss.py

    - name: Build site
      run: |
        cd web
        npm run build

    - name: Prepare deployment
      run: |
        mkdir -p output
        if [ -d "web/out" ]; then
          echo "📦 Using Next.js static export (web/out)"
          cp -r web/out/* output/
        elif [ -d "web/.next" ]; then
          echo "📦 Using Next.js build output (web/.next)"
          mkdir -p output/_next
          cp -r web/.next/static/* output/_next/ 2>/dev/null || true
          cp -r web/.next/server/* output/ 2>/dev/null || true
        else
          echo "⚠️ No build output found, using fallback"
          cp -r docs/* output/ 2>/dev/null || true
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"></head><body><p>Build required. Please run CI first.</p></body></html>' > output/index.html
        fi
        touch output/.nojekyll

    - name: Verify deployment
      run: |
        if [ ! -f "output/index.html" ] && [ ! -d "output/issues" ]; then
          echo "❌ Deployment verification failed: no content found"
          exit 1
        fi
        echo "✅ Deployment verification passed"

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
