name: CI

on:
  push:
    branches: [ main, develop, 'trae/**' ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

# 并发控制：同一分支同一工作流只运行一个，取消旧的
concurrency:
  group: "ci-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: 'latest'
        enable-cache: true
        cache-dependency-glob: 'scripts/uv.lock'

    - name: Install dependencies
      working-directory: scripts
      run: |
        uv sync --all-extras

    - name: Run black
      working-directory: scripts
      run: |
        uv run black --check src/youth_weekly/ tests/

    - name: Run isort
      working-directory: scripts
      run: |
        uv run isort --check-only src/youth_weekly/ tests/

    - name: Run flake8
      working-directory: scripts
      run: |
        uv run flake8 src/youth_weekly/ tests/

    - name: Run mypy
      working-directory: scripts
      run: |
        uv run mypy src/youth_weekly/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: 'latest'
        enable-cache: true
        cache-dependency-glob: 'scripts/uv.lock'

    - name: Install dependencies
      working-directory: scripts
      run: |
        uv sync --all-extras

    - name: Run tests
      working-directory: scripts
      run: |
        uv run pytest --cov=youth_weekly --cov-report=xml --cov-report=term --cov-fail-under=70

    - name: Upload coverage
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@v4
      with:
        files: ./scripts/coverage.xml
        fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: 'latest'
        enable-cache: true
        cache-dependency-glob: 'scripts/uv.lock'

    - name: Install dependencies
      working-directory: scripts
      run: |
        uv sync --all-extras

    - name: Run bandit
      working-directory: scripts
      run: |
        uv run bandit -r src/youth_weekly/ -ll

    - name: Run pip-audit
      working-directory: scripts
      run: |
        uv pip install pip-audit
        pip-audit --desc

  build:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: 'latest'
        enable-cache: true
        cache-dependency-glob: 'scripts/uv.lock'

    - name: Build package
      working-directory: scripts
      run: |
        uv build

  cli-smoke:
    name: CLI Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: 'latest'
        enable-cache: true
        cache-dependency-glob: 'scripts/uv.lock'

    - name: Install dependencies
      working-directory: scripts
      run: |
        uv sync --all-extras

    - name: CLI --help
      working-directory: scripts
      run: |
        uv run youth-weekly --help

    - name: CLI list
      working-directory: scripts
      run: |
        uv run youth-weekly list

    - name: CLI config
      working-directory: scripts
      run: |
        uv run youth-weekly config
