name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-web:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web/package.json

    - name: Install dependencies
      run: |
        cd web
        npm install

    - name: Lint
      run: |
        cd web
        npm run lint || true

    - name: Build
      run: |
        cd web
        npm run build || true

  test-scripts:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd scripts
        pip install -r requirements.txt

    - name: Test scripts
      run: |
        cd scripts
        python -c "import generate_static; print('✅ Scripts OK')" || echo "⚠️ Script test skipped"

  validate-content:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check content structure
      run: |
        echo "📂 Checking content structure..."
        test -d docs/issues && echo "✅ docs/issues/ exists" || echo "❌ Missing docs/issues/"
        test -f docs/issues/001/README.md && echo "✅ Issue #001 exists" || echo "❌ Missing Issue #001"
        echo ""
        echo "📊 Content statistics:"
        find docs/issues -name "README.md" | wc -l | xargs echo "  Total issues:"
