name: CI

on:
  push:
    branches: [ main, develop, 'trae/**' ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  lint:
    name: Code Linting
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: 'latest'
        enable-cache: true
        cache-dependency-glob: 'scripts/uv.lock'

    - name: Install dependencies
      working-directory: scripts
      run: |
        uv sync --all-extras

    - name: Run black
      working-directory: scripts
      run: |
        uv run black --check src/youth_weekly/ tests/

    - name: Run isort
      working-directory: scripts
      run: |
        uv run isort --check-only src/youth_weekly/ tests/

    - name: Run flake8
      working-directory: scripts
      run: |
        uv run flake8 src/youth_weekly/ tests/

    - name: Run mypy
      working-directory: scripts
      run: |
        uv run mypy src/youth_weekly/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: 'latest'
        enable-cache: true
        cache-dependency-glob: 'scripts/uv.lock'

    - name: Install dependencies
      working-directory: scripts
      run: |
        uv sync --all-extras

    - name: Run tests
      working-directory: scripts
      run: |
        uv run pytest --cov=youth_weekly --cov-report=xml --cov-report=term --cov-fail-under=70

    - name: Upload coverage
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@v4
      with:
        files: ./scripts/coverage.xml
        fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: 'latest'
        enable-cache: true
        cache-dependency-glob: 'scripts/uv.lock'

    - name: Install dependencies
      working-directory: scripts
      run: |
        uv sync --all-extras

    - name: Run bandit
      working-directory: scripts
      run: |
        uv run bandit -r src/youth_weekly/ -ll

    - name: Run pip-audit
      working-directory: scripts
      run: |
        uv pip install pip-audit
        pip-audit --desc

  build:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: 'latest'
        enable-cache: true
        cache-dependency-glob: 'scripts/uv.lock'

    - name: Build package
      working-directory: scripts
      run: |
        uv build

  cli-smoke:
    name: CLI Smoke Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: 'latest'
        enable-cache: true
        cache-dependency-glob: 'scripts/uv.lock'

    - name: Install dependencies
      working-directory: scripts
      run: |
        uv sync --all-extras

    - name: CLI --help
      working-directory: scripts
      run: |
        uv run youth-weekly --help

    - name: CLI list
      working-directory: scripts
      run: |
        uv run youth-weekly list

    - name: CLI config
      working-directory: scripts
      run: |
        uv run youth-weekly config

  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Type check
        working-directory: web
        run: npm run type-check

      - name: Build
        working-directory: web
        run: npm run build
