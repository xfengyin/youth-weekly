name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-web:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Install dependencies
      run: |
        cd web
        npm install

    - name: Lint
      run: |
        cd web
        npm run lint

    - name: Type check
      run: |
        cd web
        npm run type-check

    - name: Build
      run: |
        cd web
        npm run build

  test-scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v6

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd scripts
        pip install -r requirements.txt
        pip install pytest

    - name: Run unit tests
      run: |
        cd scripts
        python -m pytest tests/ -v --tb=short

    - name: Security scan - pip-audit
      run: |
        cd scripts
        pip install pip-audit
        pip-audit --requirement requirements.txt --format columns

    - name: Verify scripts can be imported
      run: |
        cd scripts
        python -c "from src import load_all_issues, get_latest_issue; print('✅ Module import OK')"

  validate-content:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Check content structure
      run: |
        echo "📂 Checking content structure..."
        test -d docs/issues && echo "✅ docs/issues/ exists" || { echo "❌ Missing docs/issues/"; exit 1; }
        test -f docs/issues/001/README.md && echo "✅ Issue #001 exists" || { echo "❌ Missing Issue #001"; exit 1; }
        echo ""
        echo "📊 Content statistics:"
        find docs/issues -name "README.md" | wc -l | xargs echo "  Total issues:"
