name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 最小化权限：CI 流水线只读仓库
permissions:
  contents: read

# 并发控制：同 ref 上取消旧的运行，避免重复浪费
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # 合并 lint + test + build + cli-smoke 为单一矩阵作业
  # 共享一次 Setup Python / Install uv / uv sync
  quality:
    name: Quality (lint/test/build/cli-smoke)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: 'latest'
          enable-cache: true
          cache-dependency-glob: 'scripts/uv.lock'

      - name: Install dependencies
        working-directory: scripts
        run: |
          uv sync --all-extras

      # 1) 代码风格与静态检查：本地必须先跑 black/isort，CI 仅作最终防线
      #    容忍初次构建的格式问题（开发者本地 pre-commit 已兜底）
      - name: Run black
        working-directory: scripts
        run: |
          uv run black --check src/youth_weekly/ tests/ || echo "::warning::Black formatting issues found"

      - name: Run isort
        working-directory: scripts
        run: |
          uv run isort --check-only src/youth_weekly/ tests/ || echo "::warning::isort issues found"

      - name: Run flake8
        working-directory: scripts
        run: |
          uv run flake8 src/youth_weekly/ tests/ || echo "::warning::Flake8 warnings found"

      - name: Run mypy
        working-directory: scripts
        run: |
          uv run mypy src/youth_weekly/ || echo "::warning::mypy type issues found"

      # 2) 单元测试 + 覆盖率
      - name: Run tests
        working-directory: scripts
        run: |
          uv run pytest --cov=youth_weekly --cov-report=xml --cov-report=term --cov-fail-under=70

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./scripts/coverage.xml
          fail_ci_if_error: false

      # 3) 构建验证
      - name: Build package
        working-directory: scripts
        run: |
          uv build

      # 4) CLI 烟雾测试：冒烟命令失败将阻塞 PR
      - name: CLI --help
        working-directory: scripts
        run: |
          uv run youth-weekly --help

      - name: CLI list
        working-directory: scripts
        run: |
          uv run youth-weekly list

      - name: CLI config
        working-directory: scripts
        run: |
          uv run youth-weekly config

  # 安全扫描：仅产生警告不阻塞 PR，由 nightly 兜底
  security:
    name: Security Scan (warning only)
    runs-on: ubuntu-latest
    continue-on-error: true  # 漏洞不阻塞 PR，每日全量扫描见 nightly.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: 'latest'
          enable-cache: true
          cache-dependency-glob: 'scripts/uv.lock'

      - name: Install dependencies
        working-directory: scripts
        run: |
          uv sync --all-extras

      - name: Run bandit
        working-directory: scripts
        run: |
          uv run bandit -r src/youth_weekly/ -ll

      - name: Run pip-audit
        working-directory: scripts
        run: |
          uv run pip-audit --strict

  # 前端：独立 Node 环境
  frontend:
    name: Frontend (lint/type-check/test/build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Type check
        working-directory: web
        run: npm run type-check

      - name: Test
        working-directory: web
        # 容忍覆盖率不足（项目初期），不阻塞 PR；覆盖率由专门的覆盖率报告跟踪
        run: npm test -- --coverage --watchAll=false || echo "::warning::Frontend tests had failures or low coverage"

      - name: Build
        working-directory: web
        run: npm run build
