# Pre-commit hooks configuration
# 安装: uv run pre-commit install
# 手动运行: uv run pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.14
        files: '\.py$'
        args: ['--line-length=88', '--target-version=py314']

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        files: '\.py$'
        args: ['--profile=black', '--line-length=88', '--known-first-party=youth_weekly']

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        files: '\.py$'
        additional_dependencies: [Flake8-pyproject]
        args: ['--config=scripts/pyproject.toml']

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: '^scripts/src/youth_weekly/.*\.py$'
        additional_dependencies:
          - pydantic>=2.0
          - types-PyYAML
          - types-requests
        args: ['--python-version=3.14', '--config-file=scripts/pyproject.toml']

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        files: '^scripts/src/youth_weekly/.*\.py$'
        args: ['-ll', '--recursive', '--skip=B101']
