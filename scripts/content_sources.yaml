# 内容源配置 - 青年周刊自动采集系统
# 每个源包含: id, name, type (rss/github/hackernews/website), url, category, enabled
#
# 重要：source_categories 是**源分类(采集层)**,与 config.yaml 中
# 的 categories(**板块分类(展示层)**)是两个不同的概念。
#   - config.yaml#categories: 9 个固定板块(editorial/tech/anime/...),控制周刊目录结构
#   - source_categories(本文件): 5 个采集分类(tech/dev/ai/research/oss),控制采集源归类
# 两者通过 expander.CATEGORY_TO_SECTION 建立映射;调整本文件时请同步
# expander.py 与 config.yaml。

sources:
  # ====== RSS 新闻源 ======
  - id: hackernews
    name: Hacker News
    type: hackernews
    url: "https://hnrss.org/frontpage"
    category: tech
    enabled: true
    max_items: 15
    min_score: 50  # HN 最低分数

  - id: github_trending
    name: GitHub Trending
    type: github_trending
    category: dev
    enabled: true
    max_items: 10

  - id: arxiv_cs
    name: arXiv CS (计算机科学)
    type: rss
    url: "http://export.arxiv.org/rss/cs"
    category: research
    enabled: true
    max_items: 10

  - id: python_weekly
    name: Python Weekly
    type: rss
    url: "https://www.pythonweekly.com/feed/"
    category: dev
    enabled: false
    max_items: 10

  - id: javascript_weekly
    name: JavaScript Weekly
    type: rss
    url: "https://javascriptweekly.com/rss"
    category: dev
    enabled: true
    max_items: 10

  - id: react_status
    name: React Status
    type: rss
    url: "https://react.statuscode.com/feed/"
    category: dev
    enabled: false
    max_items: 8

  - id: oss_news
    name: Open Source News
    type: rss
    url: "https://blog.opensource.org/feed/"
    category: oss
    enabled: true
    max_items: 5

  - id: google_ai
    name: Google AI Blog
    type: rss
    url: "https://blog.google/technology/ai/rss/"
    category: ai
    enabled: false
    max_items: 5

  # ====== 科技新闻 ======
  - id: techcrunch
    name: TechCrunch
    type: rss
    url: "https://techcrunch.com/feed/"
    category: tech
    enabled: true
    max_items: 5

  - id: the_verge
    name: The Verge - Tech
    type: rss
    url: "https://www.theverge.com/rss/index.xml"
    category: tech
    enabled: true
    max_items: 5

# 源分类的采集阈值(仅控制采集/策展数量,板块展示由 config.yaml#categories 决定)
# ID 命名应与 config.yaml#categories 或 CATEGORY_TO_SECTION 中的 key 对齐
# 若新增源分类,请在 expander.py 的 CATEGORY_TO_SECTION 中添加映射,
# 或复用 config.yaml#categories 中已有的 ID。
source_categories:
  tech:  # 复用 config.yaml 中的 tech 板块 ID
    id: tech
    min_items: 3
    max_items: 5

  dev:  # 源分类,最终映射到 config.yaml 中的 tools 板块
    id: dev
    min_items: 3
    max_items: 5

  ai:  # 源分类,最终映射到 config.yaml 中的 tech 板块
    id: ai
    min_items: 3
    max_items: 5

  research:  # 源分类,最终映射到 config.yaml 中的 tech 板块
    id: research
    min_items: 2
    max_items: 4

  oss:  # 源分类,最终映射到 config.yaml 中的 tools 板块
    id: oss
    min_items: 2
    max_items: 4

# 去重配置
dedup:
  # 使用 URL 的 MD5 指纹去重
  enabled: true
  # 去重数据库文件路径
  db_path: "scripts/.content_dedup.db"
  # 保留天数
  retention_days: 30

# 采集配置
collection:
  # HTTP 请求超时（秒）
  timeout: 30
  # 每源最大重试次数
  max_retries: 3
  # 请求间隔（秒），防止被封
  delay_between_sources: 2
  # User-Agent
  user_agent: "YouthWeekly/1.0 (Content Aggregator)"
